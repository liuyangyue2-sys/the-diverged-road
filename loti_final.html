function getClientId(){

function isoMaybe(v){
  if(!v) return null;
  const d = typeof v === "number" ? new Date(v) : new Date(v);
  return isNaN(d.getTime()) ? null : d.toISOString();
}
function buildPayload(st, eventType, rawOverride){
  const s = st || {};
  const logs = Array.isArray(s.answerLogs) ? s.answerLogs : [];
  return {
    session_id: s.sessionId || id("session"),
    client_id: getClientId(),
    last_event_id: id("evt"),
    event_type: eventType || "snapshot",
    source: "html",
    app_version: APP_VERSION,
    answer_count: s.answerCount || logs.length || 0,
    final_ending_id: s.finalEndingId || "",
    final_ending_name: s.finalEndingName || "",
    final_ending_type: s.finalEndingType || "",
    route_key: s.career || s.path || s.major || "",
    relationship_route: s.marriage || s.relation || "",
    child_route: s.child || "",
    parenting_route: s.parenting || "",
    illegal_count: s.illegalCount || 0,
    grey_count: s.greyCount || 0,
    stats: s.stats || {},
    answer_logs: Array.isArray(logs) ? logs.slice(-40) : [],
    raw: shrinkValueForStorage(rawOverride || s, 5000),
    user_agent: navigator.userAgent,
    page_url: location.href,
    started_at: isoMaybe(s.startedAt),
    finished_at: isoMaybe(s.finishedAt),
    updated_at: new Date().toISOString()
  };
}
function shrinkValueForStorage(value, maxLen){
  if(value === null || value === undefined) return value;
  if(typeof value === "string"){
    return value.length > maxLen ? value.slice(0, maxLen) + "……[已截断，避免浏览器本地缓存爆仓]" : value;
  }
  if(Array.isArray(value)){
    return value.slice(-40).map(x => shrinkValueForStorage(x, Math.max(500, Math.floor(maxLen / 4))));
  }
  if(typeof value === "object"){
    const out = {};
    for(const [k,v] of Object.entries(value)){
      if(k === "local_storage_raw" || k === "rawMigratedLocalStorage"){
        out[k] = "[已省略原始大缓存，避免 localStorage quota exceeded；可通过已解析 session 与 manifest 追踪]";
      }else if(k === "answerLogs" || k === "answer_logs"){
        out[k] = Array.isArray(v) ? v.slice(-40) : v;
      }else{
        out[k] = shrinkValueForStorage(v, Math.max(500, Math.floor(maxLen / 3)));
      }
    }
    return out;
  }
  return value;
}
function shrinkJob(job){
  const j = JSON.parse(JSON.stringify(job || {}));
  if(j.row){
    if(j.row.raw) j.row.raw = shrinkValueForStorage(j.row.raw, 3000);
    if(j.row.answer_logs) j.row.answer_logs = Array.isArray(j.row.answer_logs) ? j.row.answer_logs.slice(-40) : [];
  }
  return j;
}
function readQueue(){
  let disk = [];
  try{ disk = JSON.parse(localStorage.getItem(QUEUE_KEY)||"[]"); }catch(e){ disk = []; }
  if(!Array.isArray(disk)) disk = [];
  return disk.concat(memoryQueue || []);
}
function saveQueue(q){
  const arr = Array.isArray(q) ? q.slice(-300) : [];
  memoryQueue = [];
  try{
    localStorage.setItem(QUEUE_KEY, JSON.stringify(arr));
    return true;
  }catch(e1){
    const small = arr.map(shrinkJob).slice(-120);
    try{
      localStorage.setItem(QUEUE_KEY, JSON.stringify(small));
      return true;
    }catch(e2){
      // 浏览器本地缓存已经满了：不再让页面白屏，临时放内存队列，页面仍可继续玩。
      memoryQueue = small;
      console.warn("[cloud queue fallback to memory]", e2);
      return false;
    }
  }
}
function enqueue(job){
  const q = readQueue();
  q.push(shrinkJob(job));
  saveQueue(q);
}
async function supabaseFetch(path, options){
  const headers = Object.assign({
    "apikey": SUPABASE_KEY,
    "Authorization": "Bearer " + (options && options.token ? options.token : SUPABASE_KEY),
    "Content-Type": "application/json"
  }, (options && options.headers) || {});
  const res = await fetch(SUPABASE_URL + path, {
    method: (options && options.method) || "GET",
    headers,
    body: options && options.body ? JSON.stringify(options.body) : undefined
  });
  const text = await res.text();
  let data = null;
  try { data = text ? JSON.parse(text) : null; } catch(e) { data = text; }
  if(!res.ok){
    const msg = (data && (data.message || data.error_description || data.error)) || text || ("HTTP " + res.status);
    const err = new Error(msg);
    err.status = res.status;
    err.data = data;
    throw err;
  }
  return data;
}
async function runJob(job){
  if(!ensureSupabase()) return {ok:false,message:"Supabase not ready"};
  try{
    if(job.kind==="event"){
      await supabaseFetch("/rest/v1/session_events", {
        method:"POST",
        headers:{"Prefer":"return=minimal"},
        body: job.row
      });
      return {ok:true};
    }
    if(job.kind==="latest"){
      await supabaseFetch("/rest/v1/sessions_latest?on_conflict=session_id", {
        method:"POST",
        headers:{"Prefer":"resolution=merge-duplicates,return=minimal"},
        body: job.row
      });
      return {ok:true};
    }
    return {ok:true};
  }catch(error){
    const msg = error && error.message ? error.message : String(error);
    if(msg.includes("duplicate") || msg.includes("23505")) return {ok:true};
    return {ok:false,message:msg,status:error.status,data:error.data};
  }
}
async function flushSupabaseQueue(){
  if(flushing) return false;
  const q = readQueue();
  if(!q.length) return true;
  flushing = true;
  const remain = [];
  try{
    for(const job of q){
      const res = await runJob(job);
      if(!res.ok){ remain.push(job); console.warn("[cloud sync failed]", res, job); }
    }
    saveQueue(remain);
    cloudStatus = remain.length ? `云同步部分失败，待补传 ${remain.length} 条` : "云同步成功";
    return remain.length===0;
  }finally{ flushing = false; }
}
function syncStateToSupabase(st, eventType){
  try{
    const latest = buildPayload(st || state || {}, eventType || "snapshot");
    const eventRow = Object.assign({}, latest, {client_event_id: latest.last_event_id, created_at: new Date().toISOString()});
    delete eventRow.last_event_id; delete eventRow.started_at; delete eventRow.finished_at; delete eventRow.updated_at;
    enqueue({kind:"event", row:eventRow});
    enqueue({kind:"latest", row:latest});
    flushSupabaseQueue().catch(console.warn);
    return true;
  }catch(e){ console.warn("syncStateToSupabase error", e); return false; }
}

function migrateOldLocalDataOnce(){
  if(localStorage.getItem(MIGRATE_DONE_KEY)==="1") return;

  const manifest = [];
  const parsedSessions = [];
  const words = ["session","sessions","current","state","answer","answers","result","ending","life","loti","人生","选择","结局"];

  for(let i=0;i<localStorage.length;i++){
    const k = localStorage.key(i);
    if(!k) continue;
    if(k === QUEUE_KEY) continue;
    if(k.includes("supabase_queue")) continue;

    const lower = k.toLowerCase();
    if(!words.some(w => lower.includes(String(w).toLowerCase()))) continue;

    let v = "";
    try{ v = localStorage.getItem(k) || ""; }catch(e){ v = ""; }

    manifest.push({
      key:k,
      size:v.length,
      preview:v.slice(0, 500)
    });

    try{
      const parsed = JSON.parse(v);
      if(Array.isArray(parsed)){
        parsed.forEach(item => {
          if(item && typeof item === "object" && (item.sessionId || item.answerLogs || item.stats || item.finalEndingId)){
            parsedSessions.push(item);
          }
        });
      }else if(parsed && typeof parsed === "object"){
        if(Array.isArray(parsed.sessions)){
          parsed.sessions.forEach(item => {
            if(item && typeof item === "object") parsedSessions.push(item);
          });
        }else if(parsed.sessionId || parsed.answerLogs || parsed.stats || parsed.finalEndingId){
          parsedSessions.push(parsed);
        }
      }
    }catch(e){}
  }

  // 能解析成 session 的旧数据，逐条补传；不会把整个 localStorage 原文塞进队列。
  const seen = new Set();
  parsedSessions.slice(-80).forEach((old, idx) => {
    const sid = old.sessionId || old.session_id || ("migrated_" + idx + "_" + Date.now());
    if(seen.has(sid)) return;
    seen.add(sid);
    old.sessionId = sid;
    syncStateToSupabase(old, old.finalEndingId ? "migrate_finished_session" : "migrate_session");
  });

  // 未解析部分只上传 manifest，避免再次触发 quota exceeded。
  if(manifest.length){
    const temp = {sessionId:id("migrate_manifest"), startedAt:Date.now(), answerCount:parsedSessions.length, stats:{}, answerLogs:[]};
    const payload = buildPayload(temp, "migrate_local_storage_manifest", {
      migrated_at:new Date().toISOString(),
      parsed_session_count: parsedSessions.length,
      local_storage_manifest: manifest
    });
    const ev = Object.assign({}, payload, {client_event_id:payload.last_event_id, created_at:new Date().toISOString()});
    delete ev.last_event_id; delete ev.started_at; delete ev.finished_at; delete ev.updated_at;
    enqueue({kind:"event", row:ev});
    enqueue({kind:"latest", row:payload});
  }

  try{ localStorage.setItem(MIGRATE_DONE_KEY, "1"); }catch(e){}
}

function eligible(qn){

function checkZeroEnding(){
  if(state.stats.wealth <= 0) return "Z01";
  if(state.stats.health <= 0) return "Z02";
  if(state.stats.mission <= 0) return "Z03";
  if(state.stats.relationship <= 0) return "Z04";
  return "";
}
function maybeCatchIllegal(){
  const rates = [0.35,0.45,0.55,0.65];
  const idx = Math.min(Math.max(state.illegalCount-1,0), rates.length-1);
  return Math.random() < rates[idx];
}
function applyStartup(op){
  if(!op.startup) return "";
  if(op.startup==="failed"){ state.startupFailed += 1; return "创业止损，系统记录一次失败。"; }
  if(op.startup==="side") return "副业路线记录：慢慢试水。";
  state.startupAttempts += 1;
  const base = op.startup==="stable" ? 0.48 : op.startup==="gamble" ? 0.25 : 0.18;
  const guarantee = state.startupAttempts >= 3 && state.startupSuccess === 0;
  const p = guarantee ? Math.min(base + 0.15, 0.7) : base;
  if(Math.random() < p){
    state.startupSuccess += 1;
    if(guarantee) state.startupGuaranteeSuccess = true;
    state.stats.wealth = clamp(state.stats.wealth + (op.startup==="stable" ? 9 : 13));
    state.stats.mission = clamp(state.stats.mission + 3);
    return guarantee ? "保底机制触发：最后一搏居然起飞，E13 伏笔已埋。" : "创业判定成功：财富和使命获得额外上涨。";
  }else{
    state.startupFailed += 1;
    state.stats.wealth = clamp(state.stats.wealth - (op.startup==="stable" ? 3 : 6));
    state.stats.health = clamp(state.stats.health - 2);
    return "创业判定失败：努力不是没用，只是市场暂时不讲情面。";
  }
}
function chooseOption(key){
  if(!state || state.isFinished) return;
  const qn = getCurrentQuestion();
  const op = qn.options.find(x => x.key === key);
  if(!op) return;
  const before = JSON.parse(JSON.stringify(state.stats));
  Object.entries(op.delta || {}).forEach(([k,v]) => state.stats[k] = clamp((state.stats[k] || 0) + v));
  if(op.major) state.major = op.major;
  if(op.path) state.path = op.path;
  if(op.career) state.career = op.career;
  if(op.relation) state.relation = op.relation;
  if(op.marriage) state.marriage = op.marriage;
  if(op.child) state.child = op.child;
  if(op.parenting) state.parenting = op.parenting;
  if(op.tags) state.tags = [...new Set(state.tags.concat(op.tags))];
  let feedback = "已选择：" + op.text;
  if(op.grey){ state.greyCount += 1; feedback += "｜灰色选择已记录。"; }
  if(op.illegal){
    state.illegalCount += 1;
    feedback += "｜违法/高危选择已记录，抓捕概率随次数上升。";
    if(maybeCatchIllegal()){
      state.caught = true;
      finishSession("H01");
      return;
    }
  }
  const startupMsg = applyStartup(op);
  if(startupMsg) feedback += "｜" + startupMsg;
  state.answeredIds.push(qn.id);
  state.answerCount += 1;
  state.answerLogs.push({qId:qn.id,title:qn.title,choice:key,text:op.text,delta:op.delta,before,after:state.stats,time:new Date().toISOString()});
  lastFeedback = feedback;
  const zero = checkZeroEnding();
  if(zero){ finishSession(zero); return; }
  if(state.answerCount >= 32){ finishSession(); return; }
  saveCurrent();
  syncStateToSupabase(state, "choice");
  render();
}
function scoreTotal(){ return Object.values(state.stats).reduce((a,b)=>a+b,0); }
function determineEnding(){
  if(state.caught || state.illegalCount >= 4) return "H01";
  if(state.career === "体制" && state.illegalCount > 0 && state.stats.wealth >= 58 && state.stats.relationship >= 58 && state.stats.mission < 55) return "H02";
  if(state.career === "体制" && state.illegalCount === 0 && state.stats.mission >= 68 && state.stats.relationship >= 58) return "E01";
  if(state.startupGuaranteeSuccess) return "E13";
  if(state.startupSuccess >= 2 && state.stats.wealth >= 70) return "E03";
  if(state.tags.includes("隐士") && state.stats.health >= 60 && state.stats.mission >= 60) return "H04";
  if(state.stats.wealth >= 78 && state.stats.mission <= 45) return "E06";
  if(state.stats.wealth >= 78) return "E05";
  if(state.stats.health >= 78) return "E10";
  if(state.stats.relationship >= 78) return "E09";
  if(state.stats.mission >= 82 && (state.tags.includes("科研") || state.tags.includes("深耕") || state.major === "工科" || state.major === "AI")) return "E02";
  if(state.stats.mission >= 76 && state.path === "读研") return "E11";
  if(state.major === "文科" || state.major === "艺术") return "E12";
  if(state.career === "大厂") return "E04";
  if(state.career === "体制") return "E14";
  if(state.career === "基层") return "E15";
  if(state.path === "创业" || state.career === "创业") return state.startupSuccess > 0 ? "H03" : "E16";
  const vals = Object.values(state.stats);
  if(vals.every(v => v < 42)) return "E08";
  if(vals.every(v => v >= 42 && v <= 62)) return "E07";
  return scoreTotal() >= 245 ? "E15" : "E07";
}
function finishSession(forcedId){
  if(!state) return;
  const eid = forcedId || determineEnding();
  const ending = ENDINGS.find(e => e.id === eid) || ENDINGS.find(e => e.id === "E07");
  state.finalEndingId = ending.id;
  state.finalEndingName = ending.name;
  state.finalEndingType = ending.type;
  state.finishedAt = Date.now();
  state.isFinished = true;
  unlock(ending.id);
  const archive = getArchive().filter(x => x.sessionId !== state.sessionId);
  archive.unshift(state);
  saveArchive(archive);
  saveCurrent();
  syncStateToSupabase(state, "finish");
  screen = "result";
  render();
}

/* ====== 管理员后台 ====== */
async function adminLoginSupabase(){
  if(!ensureSupabase()) return;
  const email = ($("adminEmail")?.value || "").trim();
  const password = ($("adminPassword")?.value || "").trim();
  if(!email || !password){ alert("请输入管理员邮箱和密码。"); return; }
  try{
    const data = await supabaseFetch("/auth/v1/token?grant_type=password", {
      method:"POST",
      headers:{"Authorization":"Bearer " + SUPABASE_KEY},
      body:{email,password}
    });
    adminAccessToken = data && data.access_token ? data.access_token : "";
    if(!adminAccessToken) throw new Error("没有拿到 access_token，请检查邮箱密码。");
    cloudStatus = "管理员登录成功，正在先补传本地记录。";
    await syncAllLocalRecordsToCloud(true);
    await flushSupabaseQueue();
    await loadCloudAdminData();
  }catch(error){
    alert("登录失败：" + (error.message || error));
  }
}
async function adminLogoutSupabase(){
  adminAccessToken = "";
  cloudSessions = [];
  cloudStatus = "已退出云后台。";
  render();
}
async function loadCloudAdminData(){
  if(!ensureSupabase()) return;
  if(!adminAccessToken){
    alert("请先登录管理员账号。");
    return;
  }
  try{
    /* loadCloudAdminData_sync_v5 */
    await syncAllLocalRecordsToCloud(false);
    await flushSupabaseQueue();
    const select = "session_id,client_id,event_type,source,app_version,answer_count,final_ending_id,final_ending_name,final_ending_type,route_key,relationship_route,child_route,parenting_route,illegal_count,grey_count,stats,answer_logs,raw,user_agent,page_url,started_at,finished_at,updated_at";
    const data = await supabaseFetch("/rest/v1/sessions_latest?select=" + encodeURIComponent(select) + "&order=updated_at.desc&limit=10000", {
      method:"GET",
      token: adminAccessToken
    });
    cloudSessions = (data || []).map(r => Object.assign({}, r.raw || {}, {
      sessionId:r.session_id,clientId:r.client_id,answerCount:r.answer_count,finalEndingId:r.final_ending_id,finalEndingName:r.final_ending_name,
      finalEndingType:r.final_ending_type,routeKey:r.route_key,relationshipRoute:r.relationship_route,childRoute:r.child_route,parentingRoute:r.parenting_route,
      illegalCount:r.illegal_count,greyCount:r.grey_count,stats:r.stats || {},answerLogs:r.answer_logs || [],updatedAt:r.updated_at,pageUrl:r.page_url
    }));
    cloudStatus = "已读取云端记录：" + cloudSessions.length + " 条。";
    render();
  }catch(error){
    alert("读取失败：" + (error.message || error) + "。请确认 SQL 已执行，且邮箱已加入 admin_users。");
  }
}
function summarizeCloud(){
  const s = {total:cloudSessions.length,completed:0,illegalSessions:0,endingCount:{}};
  cloudSessions.forEach(x => {
    const name = x.finalEndingName || x.finalEndingId || "未完成/未记录";
    s.endingCount[name] = (s.endingCount[name] || 0) + 1;
    if(x.finalEndingId || x.finalEndingName) s.completed += 1;
    if((x.illegalCount||0)>0 || (x.greyCount||0)>0) s.illegalSessions += 1;
  });
  s.illegalRate = s.total ? s.illegalSessions / s.total : 0;
  return s;
}
function exportCloudJSON(){
  const blob = new Blob([JSON.stringify(cloudSessions,null,2)], {type:"application/json"});
  downloadBlob(blob, "loti_cloud_sessions.json");
}
function exportCloudWord(){
  const sum = summarizeCloud();
  const rows = cloudSessions.map((s,i)=>`<tr><td>${i+1}</td><td>${htmlEscape(s.sessionId)}</td><td>${htmlEscape(s.finalEndingName||s.finalEndingId||"未完成")}</td><td>${htmlEscape(s.answerCount||0)}</td><td>${htmlEscape(s.illegalCount||0)}</td><td>${htmlEscape(s.updatedAt||"")}</td></tr>`).join("");
  const html = `<html><head><meta charset="utf-8"><style>body{font-family:"Microsoft YaHei"}table{border-collapse:collapse;width:100%}td,th{border:1px solid #999;padding:6px}</style></head><body><h1>人生算法云端数据导出</h1><p>总记录：${sum.total}；已完成：${sum.completed}；违法/灰色比例：${(sum.illegalRate*100).toFixed(2)}%</p><table><tr><th>#</th><th>Session</th><th>结局</th><th>题数</th><th>违法</th><th>更新时间</th></tr>${rows}</table></body></html>`;
  downloadBlob(new Blob(["\ufeff",html], {type:"application/msword"}), "loti_cloud_sessions.doc");
}
function downloadBlob(blob,name){ const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=name; a.click(); URL.revokeObjectURL(a.href); }

/* ====== 渲染 ====== */

  const app = $("app");
  if(screen==="home") return renderHome(app);
  if(screen==="game") return renderGame(app);
  if(screen==="result") return renderResult(app);
  if(screen==="archive") return renderArchive(app);
  if(screen==="endings") return renderEndings(app);
  if(screen==="admin") return renderAdmin(app);
}

}

    ${STATS.map(([k,n])=>`<div class="stat"><div class="statTop"><span>${n}</span><b>${state.stats[k]}</b></div><div class="bar"><i style="width:${state.stats[k]}%"></i></div></div>`).join("")}

function deltaText(delta){
  return Object.entries(delta||{}).map(([k,v])=>{
    const name = STATS.find(x=>x[0]===k)?.[1] || k;
    return `${name}${v>=0?"+":""}${v}`;
  }).join("，");
}

function preview(src){ $("lightboxImg").src = src; $("lightbox").classList.add("active"); }
function closePreview(){ $("lightbox").classList.remove("active"); }

/* ====== 启动 ====== */
window.addEventListener("online", ()=>flushSupabaseQueue().catch(console.warn));
document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="hidden") flushSupabaseQueue().catch(()=>{}); });
function boot(){
  try{
    forceCloudBootstrap();
    state = loadCurrent();
    render();
  }catch(error){
    console.error(error);
    const app = document.getElementById("app");
    if(app){
      app.innerHTML = `<div class="wrap"><div class="card"><h1>页面脚本报错</h1><p>错误信息：${htmlEscape(error.message || error)}</p><button onclick="localStorage.clear();location.reload()">清空本地缓存并重载</button></div></div>`;
    }
  }
}
window.onload = boot;
document.addEventListener("DOMContentLoaded", () => setTimeout(boot, 0));
</script>
