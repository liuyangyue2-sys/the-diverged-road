  return SUPABASE_ENABLED;
}

function $(id){return document.getElementById(id)}
function escapeHtml(s){return String(s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function nl2br(s){return escapeHtml(s).replace(/\n/g,'<br>')}

async function finishSession(st){
  if(!st || !st.finalEndingId) return;
  unlock(st.finalEndingId);
  const list=getSessions().filter(x=>x.sessionId!==st.sessionId);
  list.unshift(JSON.parse(JSON.stringify(st)));
  setSessions(list.slice(0,300));
  saveCurrent();
  // 1) 用 keepalive fetch 兜底：即使玩家立即关页面也能把结局送到 Supabase
  try { syncFinishViaBeacon(st); } catch(e){ console.warn('keepalive backup failed:', e); }
  // 2) 正式 await 一次走 SDK 的 upsert，等同步成功再返回
  let synced = false;
  try { synced = await syncStateToSupabase(st, 'finish'); } catch(e){ console.warn('finish sync error:', e); }
  if(synced) markSessionSynced(st.sessionId);
}
function markSessionSynced(sessionId){
  if(!sessionId) return;
  const list = getSessions();
  let changed = false;
  for(const s of list){
    if(s && s.sessionId === sessionId && !s.cloudSynced){
      s.cloudSynced = true;
      s.cloudSyncedAt = Date.now();
      changed = true;
    }
  }
  if(changed) setSessions(list);
}
function syncFinishViaBeacon(st){
  if(!SUPABASE_ENABLED || !SUPABASE_URL || !SUPABASE_ANON_KEY) return;
  const payload = buildSupabasePayload(st, 'finish');
  const url = SUPABASE_URL.replace(/\/$/,'') + '/rest/v1/sessions_latest?on_conflict=session_id';
  const headers = {
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
    'Content-Type': 'application/json',
    'Prefer': 'resolution=merge-duplicates,return=minimal'
  };
  // keepalive:true 让请求在页面卸载之后还能继续完成
  fetch(url, { method:'POST', headers, body: JSON.stringify(payload), keepalive: true })
    .catch(err => console.warn('keepalive fetch failed:', err));
}
function cloudToUrl(src){
  if(!src) return '';
  if(src.startsWith('cloud://')){
    const m = src.match(/^cloud:\/\/[^/]+\/(.*)$/);
    return m ? `${CLOUD_HTTP_BASE}/${m[1]}` : '';
  }
  return src;
}

function safeClone(value, fallback){
  try { return JSON.parse(JSON.stringify(value || fallback)); }
  catch(e){ return fallback; }
}
function hasAnyTagForSync(st, tags) {
  const list = Array.isArray(st && st.tags) ? st.tags : [];
  return tags.some(tag => list.includes(tag));
}
function buildSupabasePayload(st, eventType){
  const logs = st && Array.isArray(st.answerLogs) ? st.answerLogs : [];
  const flags = st && st.flags ? st.flags : {};
  const nowIso = new Date().toISOString();
  return {
    session_id: st.sessionId || ('session_' + Date.now()),
    client_id: getClientId(),
    event_type: eventType || 'snapshot',
    answer_count: st.answerCount || logs.length || 0,
    final_ending_id: st.finalEndingId || '',
    final_ending_name: st.finalEndingName || '',
    final_ending_type: st.finalEndingType || '',
    route_key: st.routeKey || '',
    relationship_route: st.relationshipRoute || (flags.marriedBranch ? '已婚/家庭线' : (flags.soloBranch ? '独处/搭子线' : '未记录')),
    child_route: st.childRoute || (hasAnyTagForSync(st, ['有娃计划','育儿线','孩子兴趣']) ? '有子女/育儿线' : '未明确'),
    parenting_route: st.parentingRoute || (hasAnyTagForSync(st, ['控制型家长','尊重兴趣','育儿线']) ? '已进入育儿议题' : '未记录'),
    illegal_count: flags.illegalChoiceCount || st.illegalCount || 0,
    grey_count: flags.everGrey ? Math.max(st.greyCount || 0, 1) : (st.greyCount || 0),
    stats: safeClone(st.stats, {}),
    answer_logs: safeClone(logs, []),
    raw: safeClone(st, {}),
    updated_at: nowIso
  };
}
async function insertEventSample(payload){
  if(!sb) return;
  const shouldLog = payload.event_type === 'start' || payload.event_type === 'finish' || payload.answer_count % 8 === 0;
  if(!shouldLog) return;
  const eventPayload = Object.assign({}, payload);
  delete eventPayload.updated_at;
  await sb.from('session_events').insert(eventPayload);
}
async function syncStateToSupabase(st, eventType){
  if(!refreshSupabaseClient() || !sb || !st){
    cloudStatus = 'Supabase 未配置，本次只保存到本地浏览器。';
    return false;
  }
  try{
    const payload = buildSupabasePayload(st, eventType);
    syncInFlight = true;
    const { error } = await sb.from('sessions_latest').upsert(payload, { onConflict: 'session_id' });
    if(error){
      cloudStatus = 'Supabase 同步失败：' + error.message;
      console.warn(cloudStatus, error);
      return false;
    }
    insertEventSample(payload).catch(err => console.warn('事件采样写入失败，不影响主同步：', err.message || err));
    lastSyncAt = Date.now();
    cloudStatus = 'Supabase 同步成功：' + payload.event_type + ' / ' + payload.answer_count + '题';
    return true;
  }catch(err){
    cloudStatus = 'Supabase 同步异常：' + (err.message || err);
    console.warn(cloudStatus, err);
    return false;
  }finally{
    syncInFlight = false;
  }
}

  }

function chooseOption(key){
  if(!state || state.isFinished) return;
  const q = engine.getCurrentQuestion(state);
  if(!q) return;
  state.historyStack = state.historyStack || [];
  state.historyStack.push(engine.createSnapshot(state));
  const res = engine.applyOption(state, q, key);
  if(!res.ok){ alert(res.message||'选择失败'); return; }
  lastFeedback = res.feedback || '';
  if(res.immediateEnding){
    finishSession(state);
    show('result');
    return;
  }
  const zeroId = engine.checkZeroEnding(state.stats);
  if(zeroId){
    const ending = engine.evaluateEnding(state);
    lastFeedback += ' 数值归零，人生系统强制结算。';
    finishSession(state);
    show('result');
    return;
  }
  const step = engine.advanceStateAfterAnswer(state);
  if(step.finished){
    finishSession(state);
    show('result');
    return;
  }
  state.syncVersion = (state.syncVersion||0)+1;
  saveCurrent();
  syncStateToSupabase(state, 'answer');
  show('game');
}
function undo(){
  if(!state) return;
  const res = engine.undoLastAnswer(state);
  if(!res.ok){ alert(res.message); return; }
  state = res.state;

  syncStateToSupabase(state, 'rollback');
  show('game');
}

async function backfillLocalToCloud(){
  if(!refreshSupabaseClient() || !sb){ alert('Supabase 未配置或 SDK 未加载，无法补传。'); return; }
  const list = getSessions();
  if(!list.length){ alert('本地没有可补传的历史局。'); return; }
  if(!confirm('准备把 ' + list.length + ' 条本地历史局补传到云端。\n相同 sessionId 的云端记录会被覆盖，确认继续？')) return;
  let ok = 0, fail = 0, dirty = false;
  for(let i=0;i<list.length;i++){
    const st = list[i];
    if(!st || !st.finalEndingId) { continue; }
    if(!st.sessionId){ st.sessionId = 'legacy_' + i + '_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); dirty = true; }
    try {
      const payload = buildSupabasePayload(st, 'backfill');
      const { error } = await sb.from('sessions_latest').upsert(payload, { onConflict: 'session_id' });
      if(error){ fail++; console.warn('补传失败：', st.sessionId, error.message); }
      else { ok++; st.cloudSynced = true; st.cloudSyncedAt = Date.now(); dirty = true; }
    } catch(err){ fail++; console.warn('补传异常：', err); }
  }
  if(dirty) setSessions(list);
  cloudStatus = '本地补传完成：成功 ' + ok + '，失败 ' + fail + '。';
  alert(cloudStatus);
  if(cloudAdminLogged){ try { await loadCloudAdminData(); } catch(e){ console.warn(e); } }
  render();
}
// 进入页面后自动调用：不弹窗、不阻塞，遇到没传过的旧局就静默上云。
// 同时把"正在进行中的当前局"也直接 upsert，保证刷新页面也不会丢进度。
async function autoBackfillOnce(){
  // SDK 没就绪先等：有些 CDN 慢/失败，留出最多 8 秒让备用 CDN 加载完
  if(!sb || !SUPABASE_ENABLED){
    for(let i=0;i<16;i++){
      if(refreshSupabaseClient() && sb) break;
      await new Promise(r=>setTimeout(r, 500));
    }
  }
  if(!refreshSupabaseClient() || !sb) return;

  let ok = 0, fail = 0, dirty = false;

  // 1) 先把"当前进行中的局"也尝试同步一次（之前只有结局后才同步）
  try {
    const cur = loadCurrent();
    if(cur && (cur.sessionId || cur.answerCount > 0 || (cur.answerLogs||[]).length > 0)){
      if(!cur.sessionId){ cur.sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); saveCurrent(); }
      const event = cur.isFinished ? 'finish' : 'resume';
      const synced = await syncStateToSupabase(cur, event);
      if(synced) ok++;
      else fail++;
    }
  } catch(e){ console.warn('[auto-backfill] current state sync failed:', e); }

  // 2) 扫所有已经结局的本地历史，没传过的统统传一次
  const list = getSessions();
  for(let i=0;i<list.length;i++){
    const st = list[i];
    if(!st || !st.finalEndingId) continue;
    if(st.cloudSynced) continue;
    if(!st.sessionId){ st.sessionId = 'legacy_' + i + '_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); dirty = true; }
    try {
      const payload = buildSupabasePayload(st, 'auto_backfill');
      const { error } = await sb.from('sessions_latest').upsert(payload, { onConflict: 'session_id' });
      if(error){ fail++; console.warn('[auto-backfill] failed:', st.sessionId, error.message); }
      else { ok++; st.cloudSynced = true; st.cloudSyncedAt = Date.now(); dirty = true; }
    } catch(err){ fail++; console.warn('[auto-backfill] exception:', err); }
  }
  if(dirty) setSessions(list);
  if(ok || fail) console.log('[auto-backfill] ok=' + ok + ' fail=' + fail);
  if(ok){
    cloudStatus = '已自动上云 ' + ok + ' 条数据' + (fail ? '（失败 ' + fail + '）' : '') + '。';
    if(currentView === 'admin'){ try { render(); } catch(e){} }
  } else if(fail){
    cloudStatus = '云同步全部失败：' + fail + ' 条。请点云同步诊断查原因。';
    if(currentView === 'admin'){ try { render(); } catch(e){} }
  }
}

async function diagnoseCloudSync(){
  const lines = [];
  lines.push('—— 云同步诊断 ——');
  lines.push('SDK 加载: ' + (window.supabase && window.supabase.createClient ? '✅' : '❌（CDN 没拉到 supabase-js）'));
  lines.push('Project URL: ' + (SUPABASE_URL || '空'));
  lines.push('Key 长度: ' + (SUPABASE_ANON_KEY ? SUPABASE_ANON_KEY.length : 0) + '（前缀: ' + (SUPABASE_ANON_KEY||'').slice(0,12) + '…）');
  lines.push('SUPABASE_ENABLED: ' + (SUPABASE_ENABLED ? '✅' : '❌'));
  const localList = getSessions();
  const finished = localList.filter(s=>s && s.finalEndingId);
  const synced = finished.filter(s=>s.cloudSynced);
  lines.push('本地总局数: ' + localList.length + '，已结局: ' + finished.length + '，已上云: ' + synced.length);

  if(refreshSupabaseClient() && sb){
    try {
      const probeId = 'diag_' + Date.now();
      const { error: wErr } = await sb.from('sessions_latest').upsert({
        session_id: probeId, client_id: 'diagnose', event_type: 'diagnose', raw: { diag: true }
      }, { onConflict: 'session_id' });
      lines.push('匿名写入测试: ' + (wErr ? '❌ ' + wErr.message : '✅'));
    } catch(e){ lines.push('匿名写入测试: ❌ ' + (e.message||e)); }
    try {
      const { data: authData } = await sb.auth.getUser();
      if(authData && authData.user){
        const { data, error } = await sb.from('sessions_latest').select('session_id').limit(1);
        lines.push('管理员读取测试: ' + (error ? '❌ ' + error.message + '（多半是 admin_users 没注册你的 UID）' : '✅ 能读到 ' + (data?data.length:0) + ' 行'));
      } else {
        lines.push('管理员读取测试: ⚠ 当前未登录管理员，跳过');
      }
    } catch(e){ lines.push('管理员读取测试: ❌ ' + (e.message||e)); }
  } else {
    lines.push('客户端没初始化成功，跳过网络测试。');
  }
  alert(lines.join('\n'));
  console.log(lines.join('\n'));
}
